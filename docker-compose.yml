services:
  postgres:
    image: postgres:15-alpine
    container_name: vaultscan-postgres
    environment:
      POSTGRES_DB: vaultscan
      POSTGRES_USER: vaultscan
      POSTGRES_PASSWORD: vaultscan_secret
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vaultscan']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vaultscan-redis
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vaultscan-backend
    environment:
      DATABASE_URL: postgresql://vaultscan:vaultscan_secret@postgres:5432/vaultscan
      JWT_SECRET: change-me-min-32-characters-long-production
      JWT_REFRESH_SECRET: change-me-refresh-min-32-chars-production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your-gemini-api-key}
      GEMINI_MODEL: gemini-2.0-flash-exp
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vaultscan-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
